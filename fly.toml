# fly.toml - Configuración de Fly.io para Nexaa AI Editor
# Docs: https://fly.io/docs/reference/configuration/

app = "nexaa-editor"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/healthz"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  auto_stop = false

[[mounts]]
  source = "nexaa_data"
  destination = "/app/data"
